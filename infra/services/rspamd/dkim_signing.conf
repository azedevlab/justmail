# Keys are provisioned by the control plane into /var/lib/rspamd/dkim
# as <domain>.<selector>.key with a matching entry in the maps below.
path = "/var/lib/rspamd/dkim/$domain.$selector.key";
selector_map = "/var/lib/rspamd/dkim/selectors.map";
allow_username_mismatch = true;
use_domain = "header";
sign_authenticated = true;
sign_local = true;
