# Bayesian classifier — statistics live in Redis (see redis.conf, db 2), so
# training survives container restarts and is shared across all rspamd workers.
# Fed by Dovecot IMAPSieve: moving a message into Junk trains spam, moving it
# back out trains ham (see services/mail/dovecot/report-*.sieve).
backend = "redis";
new_schema = true;
expire = 8640000; # tokens idle for 100 days expire
min_learns = 5;   # don't apply BAYES_* until the corpus is non-trivial
autolearn = true;
