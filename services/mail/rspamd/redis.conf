# rspamd's jinja `env` only exposes OS vars prefixed with RSPAMD_, stripping the
# prefix — so the compose service passes RSPAMD_REDIS_PASSWORD and it is read
# here as env.REDIS_PASSWORD. Without the prefix rspamd cannot auth to Redis
# (Bayes/statistics fail with NOAUTH).
servers = "redis:6379";
password = "{= env.REDIS_PASSWORD =}";
db = "2";
