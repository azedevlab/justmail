version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    ignore:
      # Next.js 16's build-time TypeScript integration does not yet support the
      # 7.x native compiler package; a major bump breaks `next build`. Hold on 5.x.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directories:
      - "/services/docker/api"
      - "/services/docker/admin"
      - "/services/docker/webmail"
      - "/services/docker/landing"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
