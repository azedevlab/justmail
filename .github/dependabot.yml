version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directories:
      - "/services/docker/api"
      - "/services/docker/admin"
      - "/services/docker/webmail"
      - "/services/docker/landing"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
