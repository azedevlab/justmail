- name: enhancement
  color: a2eeef
  description: New feature or request
- name: triage
  color: ededed
  description: Needs initial review
- name: dependencies
  color: 0366d6
  description: Dependency updates
- name: ci
  color: 6f42c1
  description: CI/CD and workflows
- name: docker
  color: 1d76db
  description: Container images
- name: documentation
  color: 0075ca
