name: Diagnostics

# Read-only operational diagnostics: tails recent container logs and checks
# storage/Radicale wiring on the production host. Manual dispatch only; never
# mutates state. Reuses the deploy SSH credentials.

on:
  workflow_dispatch:

concurrency:
  group: diagnostics-production
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Collect diagnostics
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} 'bash -s' <<'REMOTE'
          set +e
          cd /opt/justmail/app
          C="docker compose --env-file /opt/justmail/.env -f services/compose/docker-compose.yml --profile core --profile certs --profile mail --profile obs --profile sec --profile app --profile storage"

          echo "===== compose ps ====="
          $C ps -a

          echo; echo "===== api logs (error-ish, last 200) ====="
          $C logs api --since 6h --no-color 2>&1 \
            | grep -iE 'error|exception|throw|EXDEV|ECONNREFUSED|ETIMEDOUT|EACCES|ENOENT|radicale|storage|MKCOL|PROPFIND|status 4|status 5|Unhandled|at async|at /|at Object' \
            | tail -200

          echo; echo "===== api logs (raw, last 60) ====="
          $C logs api --since 6h --no-color --tail 60 2>&1

          echo; echo "===== radicale logs (last 80) ====="
          $C logs radicale --since 6h --no-color --tail 80 2>&1

          echo; echo "===== worker logs (send failures, last 120) ====="
          $C logs worker --since 24h --no-color 2>&1 \
            | grep -iE 'scheduled send|virus|clamav|storage|attachment|error|exception|EXDEV|ECONNREFUSED|ETIMEDOUT|EAI_AGAIN|status 4|status 5' \
            | tail -120

          echo; echo "===== scheduled_sends failures (db, last 20) ====="
          PGUSER=$(grep -E '^POSTGRES_USER=' /opt/justmail/.env | cut -d= -f2-)
          PGDB=$(grep -E '^POSTGRES_DB=' /opt/justmail/.env | cut -d= -f2-)
          $C exec -T postgres psql -U "$PGUSER" -d "$PGDB" -P pager=off -c \
            "SELECT id, status, attempts, left(last_error,180) AS last_error, created_at
               FROM scheduled_sends
              WHERE last_error IS NOT NULL
              ORDER BY updated_at DESC LIMIT 20;" </dev/null 2>&1

          echo; echo "===== clamav reachability (from worker) + logs ====="
          # nc/curl may be absent in the node image; use the bundled runtime.
          $C exec -T worker node -e 'const net=require("net");const s=net.connect(3310,"clamav");s.setTimeout(3000);s.on("connect",()=>{console.log("clamav:3310 reachable");s.end();process.exit(0)});s.on("error",e=>{console.log("clamav:3310 UNREACHABLE",e.code);process.exit(0)});s.on("timeout",()=>{console.log("clamav:3310 TIMEOUT");s.destroy();process.exit(0)})' </dev/null 2>&1
          $C logs clamav --since 6h --no-color --tail 15 2>&1

          echo; echo "===== storage dir (host) ====="
          ls -ld /opt/justmail/attachments 2>&1
          stat -c '%U:%G %a %n' /opt/justmail/attachments 2>&1

          echo; echo "===== cross-device / perms (inside api container) ====="
          # Redirect stdin from /dev/null: `docker compose exec` otherwise drains
          # the SSH heredoc, swallowing every section below it.
          $C exec -T api sh -lc 'echo "-- ls target --"; ls -ld /opt/justmail/attachments 2>&1; echo "-- df target vs /tmp --"; df -P /opt/justmail/attachments /tmp 2>&1; echo "-- whoami --"; id 2>&1' </dev/null 2>&1

          echo; echo "===== storage backend (.env, redacted) ====="
          grep -E '^STORAGE_(KIND|ENDPOINT|BUCKET|REGION)=' /opt/justmail/.env 2>&1
          grep -qE '^STORAGE_ACCESS_KEY=.+' /opt/justmail/.env && echo "STORAGE_ACCESS_KEY=<set>" || echo "STORAGE_ACCESS_KEY=<unset>"
          grep -qE '^STORAGE_SECRET_KEY=.+' /opt/justmail/.env && echo "STORAGE_SECRET_KEY=<set>" || echo "STORAGE_SECRET_KEY=<unset>"

          if grep -qE '^STORAGE_KIND=minio[[:space:]]*$' /opt/justmail/.env; then
            echo; echo "===== minio service + bucket init ====="
            $C logs minio --no-color --tail 20 2>&1
            echo "-- minio-init (bucket creation) --"
            $C logs minio-init --no-color 2>&1
            echo "-- bucket listing (objects) --"
            docker run --rm --network justmail_data --env-file /opt/justmail/.env \
              --entrypoint /bin/sh minio/mc:RELEASE.2025-04-16T18-13-26Z -c \
              'mc alias set jm http://minio:9000 "$STORAGE_ACCESS_KEY" "$STORAGE_SECRET_KEY" >/dev/null 2>&1 && mc ls --recursive jm/"$STORAGE_BUCKET" 2>&1 | head -50 || echo "(mc could not reach minio / bucket)"'
          fi
          REMOTE
