name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/**' build

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build apps
        run: pnpm -r --filter='./apps/**' build

  compose-validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Validate compose config
        run: |
          cp services/compose/.env.example services/compose/.env
          docker compose --env-file services/compose/.env \
            -f services/compose/docker-compose.yml \
            --profile core --profile certs --profile mail --profile obs \
            --profile sec --profile app --profile storage config -q
