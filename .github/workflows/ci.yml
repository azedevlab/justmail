name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/**' build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build apps
        run: pnpm -r --filter='./apps/**' build

  compose-validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: |
          cp services/compose/.env.example services/compose/.env
          docker compose --env-file services/compose/.env \
            -f services/compose/docker-compose.yml \
            --profile core --profile certs --profile mail --profile obs --profile sec config -q
