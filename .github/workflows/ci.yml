name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: |
          cp infra/compose/.env.example infra/compose/.env
          docker compose --env-file infra/compose/.env -f infra/compose/docker-compose.yml \
            --profile core --profile certs --profile mail --profile obs --profile sec config -q

      - name: Shellcheck scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck infra/scripts/*.sh infra/docker/*/entrypoint.sh infra/docker/certd/run.sh
