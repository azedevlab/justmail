name: Bug report
description: Report a defect in JustMail
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do **not** include secrets (tokens,
        passwords, private keys) in logs or screenshots.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or `git rev-parse --short HEAD`.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Admin console
        - Webmail
        - Mail delivery (Postfix/Dovecot)
        - Backups / retention
        - Deployment / infra
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from `docker compose logs`, with secrets removed.
      render: shell
